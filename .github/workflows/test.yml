name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
            python-version: "3.9"
            experimental: false
          - os: ubuntu-24.04
            arch: x64
            python-version: "3.10"
            experimental: false
          - os: ubuntu-24.04
            arch: x64
            python-version: "3.11"
            experimental: false
          - os: ubuntu-24.04
            arch: x64
            python-version: "3.12"
            experimental: false
          - os: ubuntu-24.04
            arch: x64
            python-version: "3.13"
            experimental: false
          - os: ubuntu-24.04
            arch: x64
            python-version: "3.14"
            experimental: false
          - os: ubuntu-24.04-arm
            arch: arm64
            python-version: "3.12"
            experimental: false
          - os: ubuntu-24.04-arm
            arch: arm64
            python-version: "3.14"
            experimental: false
          - os: macos-15
            arch: arm64
            python-version: "3.12"
            experimental: false
          - os: macos-15-intel
            arch: x64
            python-version: "3.12"
            experimental: false
          - os: windows-2025
            arch: x64
            python-version: "3.12"
            experimental: false
          - os: windows-11-arm
            arch: arm64
            python-version: "3.12"
            experimental: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.arch }}
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run Ruff lint
        run: python -m ruff check .

      - name: Check Ruff formatting
        run: python -m ruff format --check .
