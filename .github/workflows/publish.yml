name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish, for example v26.5.26. Required for manual runs."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    environment: pypi

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          architecture: x64
          cache: pip

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build tomli

      - name: Set package version from tag
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "${TAG}" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${TAG}" ]; then
            echo "Publish workflow requires a v-prefixed tag, got: ${TAG}"
            exit 1
          fi
          python scripts/bump_version.py --version "${VERSION}"

      - name: Build distributions
        run: python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
