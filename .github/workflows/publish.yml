name: Publish to PyPI

# This workflow triggers whenever you publish a new Release on GitHub
# or can be manually triggered via workflow_dispatch
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag to publish (e.g. v26.6.16)'
        required: true
        default: ''

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    # Specifies the environment we set up in PyPI
    environment: pypi

    # REQUIRED for Trusted Publishing (OIDC)
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10" # A stable build version

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build tomli

      - name: Set package version from tag
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "${TAG}" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${TAG}" ]; then
            echo "Publish workflow requires a v-prefixed tag, got: ${TAG}"
            exit 1
          fi
          python scripts/bump_version.py --version "${VERSION}"


      - name: Build the package (sdist and wheel)
        run: python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
