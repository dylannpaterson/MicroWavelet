name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump to apply when exact_version is empty."
        type: choice
        options: [patch, minor, major]
        default: patch
      exact_version:
        description: "Optional exact version, for example 1.2.3."
        required: false
        type: string
      zenodo_sandbox:
        description: "Reserve the DOI in Zenodo Sandbox instead of production Zenodo."
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, release, and publish
    runs-on: ubuntu-24.04
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
      ZENODO_DEPOSITION_ID: ${{ secrets.ZENODO_DEPOSITION_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          architecture: x64
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Apply Ruff fixes
        run: |
          python -m ruff check --fix .
          python -m ruff format .

      - name: Bump version
        id: bump
        run: |
          if [ -n "${{ inputs.exact_version }}" ]; then
            VERSION="$(python scripts/bump_version.py --version "${{ inputs.exact_version }}")"
          else
            VERSION="$(python scripts/bump_version.py --part "${{ inputs.version_bump }}")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Reserve Zenodo DOI
        run: |
          args=(--version "${{ steps.bump.outputs.version }}")
          if [ "${{ inputs.zenodo_sandbox }}" = "true" ]; then
            args+=(--sandbox)
          fi
          python scripts/reserve_zenodo_doi.py "${args[@]}"

      - name: Build distributions
        run: python -m build

      - name: Generate release notes from commits
        id: notes
        run: |
          notes_path="${RUNNER_TEMP}/release-notes.md"
          last_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          {
            echo "## Changes"
            echo
            if [ -n "${last_tag}" ]; then
              git log --pretty=format:'- %s (%h)' "${last_tag}..HEAD"
            else
              git log --pretty=format:'- %s (%h)'
            fi
          } > "${notes_path}"
          if [ "$(wc -l < "${notes_path}")" -le 2 ]; then
            echo "- Initial release." >> "${notes_path}"
          fi
          echo "path=${notes_path}" >> "$GITHUB_OUTPUT"

      - name: Commit release metadata and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: release ${{ steps.bump.outputs.tag }}"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            dist/* \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes-file "${{ steps.notes.outputs.path }}"

      - name: Publish to PyPI
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Skip PyPI publish
        if: env.PYPI_API_TOKEN == ''
        run: echo "PYPI_API_TOKEN is not configured; skipping PyPI publish."
