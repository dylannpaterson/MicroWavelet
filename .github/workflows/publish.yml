name: Publish to PyPI

# This workflow triggers whenever you publish a new Release on GitHub
on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # Specifies the environment we set up in PyPI
    environment: pypi
    
    # REQUIRED for Trusted Publishing (OIDC)
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # A stable build version

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build the package (sdist and wheel)
        run: python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1