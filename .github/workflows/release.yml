name: Release

on:
  workflow_dispatch:
    inputs:
      exact_version:
        description: "Optional exact date version, for example 26.5.26. Leave blank to use today's date."
        required: false
        type: string
      zenodo_sandbox:
        description: "Reserve the DOI in Zenodo Sandbox instead of production Zenodo."
        required: true
        type: boolean
        default: false

permissions:
  actions: write
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-24.04
    env:
      ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
      ZENODO_DEPOSITION_ID: ${{ secrets.ZENODO_DEPOSITION_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          architecture: x64
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Apply Ruff fixes
        run: |
          python -m ruff check --fix .
          python -m ruff format .

      - name: Bump version
        id: bump
        run: |
          if [ -n "${{ inputs.exact_version }}" ]; then
            VERSION="${{ inputs.exact_version }}"
            TAG="v${VERSION}"
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "Tag ${TAG} already exists; skipping release creation and PyPI publish."
              echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
              echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
              echo "tag_exists=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            VERSION="$(python scripts/bump_version.py --version "${VERSION}")"
          else
            BASE_VERSION="$(python -c 'import datetime as dt; today = dt.date.today(); print(f"{today.year % 100}.{today.month}.{today.day}")')"
            VERSION="${BASE_VERSION}"
            SERIAL=0
            while git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; do
              SERIAL=$((SERIAL + 1))
              VERSION="${BASE_VERSION}.${SERIAL}"
            done
            VERSION="$(python scripts/bump_version.py --version "${VERSION}")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=false" >> "$GITHUB_OUTPUT"

      - name: Reserve Zenodo DOI
        if: steps.bump.outputs.tag_exists != 'true'
        run: |
          args=(--version "${{ steps.bump.outputs.version }}")
          if [ "${{ inputs.zenodo_sandbox }}" = "true" ]; then
            args+=(--sandbox)
          fi
          python scripts/reserve_zenodo_doi.py "${args[@]}"

      - name: Build distributions
        if: steps.bump.outputs.tag_exists != 'true'
        run: python -m build

      - name: Generate release notes from commits
        if: steps.bump.outputs.tag_exists != 'true'
        id: notes
        run: |
          notes_path="${RUNNER_TEMP}/release-notes.md"
          last_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          {
            echo "## Changes"
            echo
            if [ -n "${last_tag}" ]; then
              git log --pretty=format:'- %s (%h)' "${last_tag}..HEAD"
            else
              git log --pretty=format:'- %s (%h)'
            fi
          } > "${notes_path}"
          if ! grep -q '^- ' "${notes_path}"; then
            echo "- Initial release." >> "${notes_path}"
          fi
          echo "path=${notes_path}" >> "$GITHUB_OUTPUT"

      - name: Commit release metadata and tag
        if: steps.bump.outputs.tag_exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No release metadata changes to commit."
          else
            git commit -m "chore: release ${{ steps.bump.outputs.tag }}"
          fi
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create GitHub release
        if: steps.bump.outputs.tag_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            dist/* \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes-file "${{ steps.notes.outputs.path }}"

      - name: Trigger trusted PyPI publishing
        if: steps.bump.outputs.tag_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish.yml --ref main -f tag="${{ steps.bump.outputs.tag }}"
